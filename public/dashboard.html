<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Seguridad Visor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light d-flex flex-column" style="height:100vh;">

  <nav class="navbar navbar-dark bg-dark navbar-shrink">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Seguridad Visor</span>
      <div class="d-flex align-items-center">
        <span class="text-light me-3 small" id="userLabel">Cargando...</span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar sesion</a>
      </div>
    </div>
  </nav>

  <div id="iframeTabs" class="d-none">
    <ul class="nav nav-tabs px-3 pt-2 bg-white" id="tabsContainer" role="tablist"></ul>
  </div>

  <div class="flex-grow-1 position-relative">
    <div id="defaultMessage" class="d-flex justify-content-center align-items-center h-100">
      <div class="text-center">
        <h4 class="text-muted">No hay contenido asignado</h4>
        <p class="text-muted">Contacta al administrador para que te asigne un iframe.</p>
      </div>
    </div>
    <div id="iframePanels" class="d-none h-100"></div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
